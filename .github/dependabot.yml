version: 2
updates:
  - package-ecosystem: github-actions
    milestone: 32 # Corresponds to 4.x
    labels:
      - "dependencies"
    commit-message:
      prefix: "(github-actions)"
    directory: "/"
    schedule:
      interval: cron
      cronjob: "0 12 * * *"
    ignore:
      - dependency-name: "gittools/actions/gitversion/setup"
      - dependency-name: "gittools/actions/gitversion/execute"
      - dependency-name: "gittools/actions/gitversion/command"

  - package-ecosystem: npm
    milestone: 32 # Corresponds to 4.x
    labels:
      - "dependencies"
    commit-message:
      prefix: "(npm)"
    groups:
      vite:
        patterns:
          - "vite"
          - "vite-node"
          - "vite-tsconfig-paths"
          - "vitest"
      eslint:
        patterns:
          - "eslint"
          - "eslint-plugin-*"
          - "eslint-config-*"
          - "typescript-eslint"
          - "@eslint/js"
          - "@stylistic/eslint-plugin"
          - "@vitest/eslint-plugin"
      types:
        patterns:
          - "@types/*"
    directory: "/"
    schedule:
      interval: cron
      cronjob: "0 12 * * *"
    open-pull-requests-limit: 10
